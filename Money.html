<style>
  :root {
    /* Warm dark neutrals */
    --bg-0: #0e0d0c;          /* page */
    --bg-1: #181614;          /* card */
    --bg-2: #221f1c;          /* card hover / inner */
    --bg-3: #2c2926;          /* border subtle */
    --line:  rgba(255,255,255,0.06);
    --line-2: rgba(255,255,255,0.10);
    --text-0: #f5f1ea;        /* primary text - warm white */
    --text-1: #c9c2b6;        /* secondary */
    --text-2: #877f73;        /* muted */
    --text-3: #5a534a;        /* very muted */

    --app-max: 440px;          /* mobile-app width on desktop */

    /* Bucket accents — same chroma family, varying hue */
    --save:    oklch(0.78 0.14 158);  /* emerald — savings & invest */
    --save-bg: oklch(0.32 0.07 158 / 0.22);
    --self:    oklch(0.82 0.13 78);   /* amber — personal */
    --self-bg: oklch(0.32 0.07 78 / 0.22);
    --fam:     oklch(0.78 0.14 12);   /* rose — family */
    --fam-bg:  oklch(0.32 0.07 12 / 0.22);
    --emerg:   oklch(0.78 0.13 235);  /* sky — emergency */
    --emerg-bg: oklch(0.32 0.07 235 / 0.22);
  }

  html, body { background: #050504; color: var(--text-0); }
  body { font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', 'Noto Sans Lao', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }

  /* App shell — phone-sized on desktop, full width on mobile */
  .app-shell {
    width: 100%;
    max-width: var(--app-max);
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0 auto;
    background: var(--bg-0);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 600px) {
    body { display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .app-shell {
      height: calc(100vh - 48px);
      max-height: 920px;
      min-height: 680px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow:
        0 30px 80px -20px rgba(0,0,0,0.6),
        0 0 0 10px #18120c,
        0 0 0 11px rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
    }
  }

  /* Lao-specific: when html lang=lo, prefer Noto Sans Lao */
  html[lang="lo"] body { font-family: 'Noto Sans Lao', 'Plus Jakarta Sans', system-ui, sans-serif; }

  /* tabular numbers for money */
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: #3a3631; }

  /* number input cleanup */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* keyframes */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(46,164,107,0.0); } 50% { box-shadow: 0 0 0 8px rgba(46,164,107,0.0); } }

  .anim-fadeUp { animation: fadeUp 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
  .anim-fadeIn { animation: fadeIn 0.5s ease both; }
  .anim-scaleIn { animation: scaleIn 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

  /* the soft glow on totals */
  .total-glow {
    background: radial-gradient(80% 80% at 50% 0%, rgba(46,164,107,0.10), transparent 70%);
  }

  .card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .card-inner {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 14px;
  }

  .btn-primary {
    background: linear-gradient(180deg, oklch(0.78 0.14 158), oklch(0.66 0.14 158));
    color: #06231a;
    font-weight: 700;
    box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 10px 30px -10px oklch(0.66 0.14 158 / 0.55);
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.15s ease;
  }
  .btn-primary:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); filter: brightness(0.98); }

  .btn-ghost {
    background: transparent;
    color: var(--text-1);
    border: 1px solid var(--line-2);
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .btn-ghost:hover { background: var(--bg-2); color: var(--text-0); border-color: rgba(255,255,255,0.18); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text-1);
    font-size: 12px;
  }

  /* select / input */
  .field {
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    color: var(--text-0);
    border-radius: 12px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .field:focus, .field:focus-within {
    outline: none;
    border-color: oklch(0.66 0.14 158);
    background: var(--bg-2);
  }
  .field::placeholder { color: var(--text-3); }

  /* segmented control */
  .seg {
    display: inline-flex; padding: 4px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    gap: 2px;
  }
  .seg button {
    padding: 8px 14px;
    border-radius: 9px;
    color: var(--text-2);
    font-weight: 500;
    font-size: 14px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .seg button.on {
    background: var(--bg-0);
    color: var(--text-0);
    box-shadow: 0 1px 0 var(--line-2);
  }
  .seg button:hover:not(.on) { color: var(--text-0); }

  /* bucket bar growing animation */
  .bar-grow {
    transform-origin: left center;
    animation: growX 0.9s cubic-bezier(0.22, 0.8, 0.25, 1) both;
  }
  @keyframes growX { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  .bucket-ring {
    position: relative;
  }
  .bucket-ring::after {
    content: ''; position: absolute; inset: -1px; border-radius: inherit; pointer-events: none;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 40%);
    mix-blend-mode: overlay;
  }

  /* nav */
  .navlink {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    color: var(--text-1);
    transition: background 0.15s ease, color 0.15s ease;
    font-weight: 500;
    font-size: 14px;
  }
  .navlink:hover { background: var(--bg-2); color: var(--text-0); }
  .navlink.active { background: var(--bg-2); color: var(--text-0); }
  .navlink.active .dot { background: oklch(0.78 0.14 158); }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--text-3); }

  /* mobile tab bar */
  .tabbar {
    background: rgba(14,13,12,0.88);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-top: 1px solid var(--line);
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 9px 2px 6px;
    color: var(--text-2);
    font-size: 10.5px;
    font-weight: 500;
    transition: color 0.15s ease;
    flex: 1;
    min-height: 54px;
    -webkit-tap-highlight-color: transparent;
  }
  .tab svg { width: 20px; height: 20px; }
  .tab.active { color: var(--text-0); }
  .tab.active svg { stroke: oklch(0.78 0.14 158); }
  .tab:active { transform: scale(0.94); }

  /* hide number arrows for currency input */
  .big-amount {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: clamp(44px, 13vw, 64px);
    letter-spacing: -0.025em;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-0);
    width: 100%;
    text-align: center;
    min-width: 0;
  }
  .big-amount::placeholder { color: var(--text-3); font-weight: 500; }

  /* subtle grid background pattern */
  .bg-noise {
    background-image:
      radial-gradient(1200px 600px at 80% -10%, rgba(46,164,107,0.06), transparent 60%),
      radial-gradient(1000px 500px at 0% 110%, rgba(220,170,80,0.05), transparent 60%);
  }

  /* details / summary cleanup */
  details summary { list-style: none; cursor: pointer; }
  details summary::-webkit-details-marker { display: none; }

  /* checkbox-ish toggle */
  .toggle {
    width: 36px; height: 20px; border-radius: 999px; background: var(--bg-3); position: relative; transition: background 0.2s ease;
    cursor: pointer; flex-shrink: 0;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 999px;
    background: var(--text-0); transition: transform 0.2s ease;
  }
  .toggle.on { background: oklch(0.66 0.14 158); }
  .toggle.on::after { transform: translateX(16px); }

  /* empty state illustration shimmer */
  .skel {
    background: linear-gradient(90deg, var(--bg-2), var(--bg-3), var(--bg-2));
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
    border-radius: 8px;
  }

  /* small entrance for list items */
  .list-enter {
    animation: fadeUp 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  /* progress bar */
  .prog-track { background: var(--bg-2); border-radius: 999px; overflow: hidden; height: 10px; border: 1px solid var(--line); }
  .prog-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, oklch(0.78 0.14 158), oklch(0.85 0.13 158));
    transition: width 0.8s cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  /* dropdown */
  .menu {
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: 12px;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.55);
  }
  .menuitem { padding: 8px 12px; cursor: pointer; color: var(--text-1); font-size: 14px; border-radius: 8px; margin: 2px; }
  .menuitem:hover { background: var(--bg-2); color: var(--text-0); }

  /* main content padding compensating mobile tab bar */
  .pb-tabsafe { padding-bottom: calc(88px + env(safe-area-inset-bottom)); }

  /* scrollable main content area */
  .screen {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .screen::-webkit-scrollbar { width: 0; }

  /* sticky top header inside shell */
  .app-header {
    position: sticky; top: 0; z-index: 30;
    background: rgba(14,13,12,0.85);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid var(--line);
  }

  /* tab bar absolute inside shell */
  .tabbar-shell {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 40;
  }

  /* bottom sheet */
  .sheet-backdrop {
    position: absolute; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    animation: fadeIn 0.2s ease both;
  }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 51;
    background: var(--bg-1);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    border-top: 1px solid var(--line-2);
    padding: 8px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 90%;
    overflow-y: auto;
    animation: sheetUp 0.32s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 99px;
    background: var(--bg-3);
    margin: 8px auto 16px;
  }

  /* fab */
  .fab {
    position: absolute; right: 20px; bottom: calc(96px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, oklch(0.78 0.14 158), oklch(0.62 0.14 158));
    color: #06231a;
    box-shadow: 0 12px 30px -6px oklch(0.55 0.14 158 / 0.55), inset 0 1px 0 rgba(255,255,255,0.2);
    z-index: 35;
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .fab:active { transform: scale(0.94); filter: brightness(0.97); }

  /* increase touch targets on mobile */
  button, .navlink, .tab, .menuitem { -webkit-tap-highlight-color: transparent; }
</style>

/* ============================================================
   Storage hook
   ============================================================ */
function useLocal(key, initial) {
  const [v, setV] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw == null ? initial : JSON.parse(raw);
    } catch { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key, v]);
  return [v, setV];
}

/* ============================================================
   Number input helpers — comma formatting while typing
   ============================================================ */
function fmtNumInput(raw) {
  const digits = String(raw).replace(/\D/g, '');
  if (!digits) return '';
  return Number(digits).toLocaleString('en-US');
}
function parseNumInput(str) {
  return parseFloat(String(str).replace(/,/g, '')) || 0;
}

async function loadFromSheets(url) {
  try {
    const res = await fetch(url, { redirect: 'follow' });
    if (!res.ok) return null;
    return JSON.parse(await res.text());
  } catch { return null; }
}

async function saveToSheets(url, data) {
  // no-cors = fire-and-forget POST; data still reaches Apps Script
  await fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data),
  });
}

/* ============================================================
   Formatters
   ============================================================ */
function fmt(amount, currency) {
  const c = CURRENCIES[currency] || CURRENCIES.LAK;
  if (amount == null || isNaN(amount)) return '0';
  try {
    return amount.toLocaleString(c.locale, {
      minimumFractionDigits: 0,
      maximumFractionDigits: c.decimals,
    });
  } catch {
    return Math.round(amount).toString();
  }
}

function fmtDate(iso, lang) {
  try {
    const d = new Date(iso);
    const locale = lang === 'lo' ? 'lo-LA' : 'th-TH';
    return d.toLocaleDateString(locale, { day: 'numeric', month: 'short', year: 'numeric' });
  } catch { return iso; }
}

function monthKey(iso) {
  const d = new Date(iso);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

/* Count-up animation hook */
function useCountUp(target, duration = 900) {
  const [val, setVal] = useState(0);
  const startRef = useRef(null);
  const fromRef = useRef(0);
  useEffect(() => {
    fromRef.current = val;
    startRef.current = null;
    let raf;
    function step(t) {
      if (!startRef.current) startRef.current = t;
      const p = Math.min(1, (t - startRef.current) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(fromRef.current + (target - fromRef.current) * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  // eslint-disable-next-line
  }, [target]);
  return val;
}

            <div className="text-[14px] font-semibold tracking-tight leading-tight">{t.appName}</div>
            <div className="text-[10.5px] leading-tight" style={{color:'var(--text-2)'}}>{t.appSubtitle}</div>
          </div>
        </div>

        {SHEETS_URL && (
          <div
            className="w-2 h-2 rounded-full shrink-0 transition-colors duration-500"
            style={{ background: { idle:'var(--text-3)', syncing:'#f0c040', ok:'#4ade80', error:'#f87171' }[syncStatus] }}
            title={syncStatus}
          />
        )}
      </header>

      {/* Scrollable screen */}
      <main className="screen px-4 pt-4 pb-tabsafe">
        {tab === 'home' && (
          <HomeScreen
            t={t}
            lang={lang}
            defaultCurrency={defaultCurrency}
            setDefaultCurrency={setDefaultCurrency}
            onAdd={handleAddEntry}
            setTab={setTab}
          />
        )}
        {tab === 'history' && (
          <HistoryScreen t={t} lang={lang} entries={entries} onDelete={handleDeleteEntry} defaultCurrency={defaultCurrency}/>
        )}
        {tab === 'expense' && (
          <ExpensesScreen
            t={t} lang={lang}
            expenses={expenses}
            onDelete={handleDeleteExpense}
            bucketTotals={bucketTotals}
            defaultCurrency={defaultCurrency}
            onOpenSheet={() => setExpSheetOpen(true)}
          />
        )}
        {tab === 'dashboard' && (
          <DashboardScreen
            t={t} lang={lang}
            entries={entries}
            bucketTotals={bucketTotals}
            totalSaved={totalSaved}
            monthlyTotals={monthlyTotals}
            defaultCurrency={defaultCurrency}
            portfolio={portfolio}
            setPortfolio={setPortfolio}
          />
        )}
        {tab === 'goals' && (
          <GoalsScreen
            t={t} lang={lang}
            goals={goals}
            setGoals={setGoals}
            bucketTotals={bucketTotals}
            defaultCurrency={defaultCurrency}
            onOpenSheet={() => setGoalSheetOpen(true)}
          />

      </main>

      {/* FAB for adding goals — visible on goals tab */}
      {tab === 'goals' && !goalSheetOpen && (
        <button onClick={() => setGoalSheetOpen(true)} className="fab anim-scaleIn" aria-label={t.goals.add}>
          <I.plus width="22" height="22"/>
        </button>
      )}

      {/* FAB for adding expenses — visible on expense tab */}
      {tab === 'expense' && !expSheetOpen && (
        <button onClick={() => setExpSheetOpen(true)} className="fab anim-scaleIn" aria-label={t.expense.add}>
          <I.plus width="22" height="22"/>
        </button>
      )}

      {/* Expense bottom sheet */}
      {expSheetOpen && (
        <ExpenseSheet
          t={t}
          defaultCurrency={defaultCurrency}
          onClose={() => setExpSheetOpen(false)}
          onAdd={(x) => { handleAddExpense(x); setExpSheetOpen(false); }}
        />
      )}

      {/* Goal bottom sheet */}
      {goalSheetOpen && (
        <GoalSheet
          t={t}
          defaultCurrency={defaultCurrency}
          onClose={() => setGoalSheetOpen(false)}
          onAdd={(g) => { setGoals(prev => [g, ...prev]); setGoalSheetOpen(false); }}
        />
      )}



      {/* Bottom tab bar (always visible, inside shell) */}
      <nav className="tabbar tabbar-shell flex items-center px-1" style={{paddingBottom: 'env(safe-area-inset-bottom)'}}>
        <button onClick={() => setTab('home')} className={'tab ' + (tab==='home'?'active':'')}>
          <I.home width="22" height="22"/><span>{t.nav.home}</span>
        </button>
        <button onClick={() => setTab('history')} className={'tab ' + (tab==='history'?'active':'')}>
          <I.history width="22" height="22"/><span>{t.nav.history}</span>
        </button>
        <button onClick={() => setTab('expense')} className={'tab ' + (tab==='expense'?'active':'')}>
          <I.expense width="22" height="22"/><span>{t.nav.expense}</span>
        </button>
        <button onClick={() => setTab('dashboard')} className={'tab ' + (tab==='dashboard'?'active':'')}>
          <I.dash width="22" height="22"/><span>{t.nav.dashboard}</span>
        </button>
        <button onClick={() => setTab('goals')} className={'tab ' + (tab==='goals'?'active':'')}>
          <I.goal width="22" height="22"/><span>{t.nav.goals}</span>
        </button>
      </nav>

  );

function NavLink({ active, onClick, icon, label }) {

    <button onClick={onClick} className={'navlink w-full ' + (active?'active':'')}>
      <span className="dot"/>
      <span className="opacity-80">{icon}</span>
      <span>{label}</span>
    </button>
  );
}

/* ============================================================
   HOME SCREEN
   ============================================================ */
function HomeScreen({ t, lang, defaultCurrency, setDefaultCurrency, onAdd, setTab }) {
  const [amount, setAmount] = useState('');
  const [currency, setCurrency] = useState(defaultCurrency);
  const [note, setNote] = useState('');
  const [date, setDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [split, setSplit] = useState(null); // { amount, currency, ts } when shown
  const [saved, setSaved] = useState(false);

  useEffect(() => { setCurrency(defaultCurrency); }, [defaultCurrency]);

  const numAmount = parseNumInput(amount);

  const doSplit = () => {
    if (numAmount <= 0) return;
    setSaved(false);
    setSplit({ amount: numAmount, currency, ts: Date.now() });
  };

  const doSave = () => {
    if (!split) return;
    onAdd({
      amount: split.amount,
      currency: split.currency,
      note: note.trim(),
      date,
    });
    setSaved(true);
    if (currency !== defaultCurrency) setDefaultCurrency(currency);
  };

  const doReset = () => {
    setAmount(''); setNote(''); setSplit(null); setSaved(false);
    setDate(new Date().toISOString().slice(0, 10));
  };

  return (
    <div>
      <section className="card p-5 pt-7 anim-fadeUp">
        <div className="text-center">
          <div className="inline-flex items-center gap-2 pill mb-4">
            <span style={{width:6,height:6,background:'var(--save)',borderRadius:99}}/>
            60 / 20 / 10 / 10
          </div>
          <h1 className="text-[22px] font-semibold tracking-tight" style={{textWrap:'pretty'}}>
            {t.home.welcome}
          </h1>
          <p className="text-[13px] mt-1.5 px-2" style={{color:'var(--text-2)'}}>
            {t.home.hint}
          </p>
        </div>

        {/* Big amount input */}
        <div className="mt-6">
          <div className="flex items-baseline justify-center gap-2">
            <span className="text-2xl" style={{color:'var(--text-3)'}}>{CURRENCIES[currency].symbol}</span>
            <input
              type="text"
              inputMode="decimal"
              className="big-amount tnum"
              placeholder="0"
              value={amount}
              onChange={(e) => {
                setAmount(fmtNumInput(e.target.value));
                setSplit(null); setSaved(false);
              }}
              onKeyDown={(e) => { if (e.key === 'Enter') doSplit(); }}
            />
          </div>

          {/* Currency segmented */}
          <div className="flex justify-center mt-4">
            <div className="seg">
              {Object.keys(CURRENCIES).map(c => (
                <button key={c} onClick={() => { setCurrency(c); setSplit(null); setSaved(false); }} className={currency===c?'on':''}>
                  {t.common.currency[c]}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* date + note */}
        <div className="grid grid-cols-1 gap-3 mt-6">
          <div>
            <label className="block text-[11px] mb-1.5" style={{color:'var(--text-2)'}}>{t.home.date}</label>
            <input
              type="date"
              className="field px-3.5 py-3 w-full text-[14px]"
              value={date}
              onChange={(e) => setDate(e.target.value)}
              max={new Date().toISOString().slice(0,10)}
              style={{colorScheme:'dark'}}
            />
          </div>
          <div>
            <label className="block text-[11px] mb-1.5" style={{color:'var(--text-2)'}}>{t.home.note}</label>
            <input
              type="text"
              className="field px-3.5 py-3 w-full text-[14px]"
              placeholder={t.home.notePlaceholder}
              value={note}
              onChange={(e) => setNote(e.target.value)}
              maxLength={80}
            />
          </div>
        </div>

        {/* Split button */}
        <div className="mt-6">
          <button
            onClick={doSplit}
            disabled={numAmount <= 0}
            className="btn-primary w-full py-3.5 rounded-2xl text-[15px] disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          >
            <I.spark width="16" height="16"/>
            {t.home.split}
          </button>
        </div>
      </section>

      {/* Result */}
      {split && (
        <section className="mt-4 card p-5 total-glow anim-fadeUp" key={split.ts}>
          <div>
            <div className="text-[11px] uppercase tracking-wider" style={{color:'var(--text-3)'}}>{t.home.result}</div>
            <div className="text-2xl font-semibold mt-1 tnum">
              <CountText value={split.amount} currency={split.currency} />
            </div>
          </div>

          <SplitBars amount={split.amount} currency={split.currency} t={t} key={split.ts+'-bars'} />

          <div className="mt-5">
            {!saved ? (
              <div className="flex items-center gap-2">
                <button className="btn-ghost flex-1 py-3 rounded-xl text-[14px]" onClick={doReset}>{t.history.cancel}</button>
                <button className="btn-primary flex-1 py-3 rounded-xl text-[14px] flex items-center justify-center gap-2" onClick={doSave}>
                  <I.check width="16" height="16"/>
                  {t.home.saveEntry}
                </button>
              </div>
            ) : (
              <div className="flex flex-col gap-2">
                <div className="pill self-center" style={{color:'var(--save)', borderColor:'rgba(63,191,134,0.3)'}}>
                  <I.check width="12" height="12"/> {t.home.saved}
                </div>
                <div className="flex items-center gap-2">
                  <button className="btn-ghost flex-1 py-3 rounded-xl text-[14px]" onClick={doReset}>{t.home.addAnother}</button>
                  <button className="btn-ghost flex-1 py-3 rounded-xl text-[14px]" onClick={() => setTab('history')}>{t.home.goHistory}</button>
                </div>
              </div>
            )}
          </div>
        </section>
      )}
    </div>
  );
}

function CountText({ value, currency }) {
  const v = useCountUp(value, 800);
  return <>{CURRENCIES[currency].symbol} {fmt(v, currency)}</>;
}

/* Bar chart for split */
function SplitBars({ amount, currency, t }) {
  const items = BUCKETS.map((b, i) => ({
    ...b,
    label: t.buckets[b.key],
    desc: t.buckets[b.key+'Desc'],
    value: amount * (b.pct / 100),
    delay: 80 + i * 100,
  }));
  const max = Math.max(...items.map(i => i.value));

  return (
    <div className="mt-5 grid grid-cols-1 gap-3">
      {items.map((it, i) => (
        <div key={it.key} className="anim-fadeUp" style={{animationDelay: it.delay+'ms'}}>
          <div className="flex items-baseline justify-between mb-1.5 gap-2">
            <div className="flex items-center gap-2 min-w-0">
              <span className="rounded-full shrink-0" style={{width:8,height:8,background:it.color}}/>
              <span className="text-[13px] font-semibold truncate">{it.label}</span>
              <span className="text-[10px] tnum shrink-0" style={{color:'var(--text-2)'}}>{it.pct}%</span>
            </div>
            <div className="tnum text-[13px] font-semibold shrink-0">
              <CountText value={it.value} currency={currency}/>
            </div>
          </div>

          <div className="relative h-7 rounded-lg overflow-hidden bucket-ring" style={{background:'var(--bg-2)', border:'1px solid var(--line)'}}>
            <div
              className="absolute inset-y-0 left-0 bar-grow"
              style={{
                width: (it.value / max * 100) + '%',
                background: `linear-gradient(90deg, ${it.color}, ${it.color} 70%, transparent)`,
                opacity: 0.85,
                animationDelay: it.delay+'ms',
              }}
            />
          </div>
          <div className="text-[10.5px] mt-1" style={{color:'var(--text-3)'}}>{it.desc}</div>
        </div>
      ))}

      {/* mini summary distribution bar */}
      <div className="mt-2">
        <div className="text-[10px] uppercase tracking-wider mb-2" style={{color:'var(--text-3)'}}>{t.home.total}</div>
        <div className="flex h-2 rounded-full overflow-hidden anim-fadeIn" style={{animationDelay:'500ms'}}>
          {items.map((it, i) => (
            <div key={i} className="bar-grow" style={{
              flex: it.pct,
              background: it.color,
              animationDelay: (500 + i*80) + 'ms',
            }}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   HISTORY SCREEN
   ============================================================ */
function HistoryScreen({ t, lang, entries, onDelete, defaultCurrency }) {
  const [filter, setFilter] = useState('all');
  const [confirmId, setConfirmId] = useState(null);

  const now = new Date();
  const curMonthKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const curYear = now.getFullYear();

  const filtered = useMemo(() => {
    return entries.filter(e => {
      if (filter === 'all') return true;
      if (filter === 'month') return monthKey(e.date) === curMonthKey;
      if (filter === 'year') return new Date(e.date).getFullYear() === curYear;
      return true;
    });
  }, [entries, filter, curMonthKey, curYear]);

  // group by month
  const groups = useMemo(() => {
    const g = {};
    for (const e of filtered) {
      const k = monthKey(e.date);
      if (!g[k]) g[k] = { key: k, items: [], total: {} };
      g[k].items.push(e);
      g[k].total[e.currency] = (g[k].total[e.currency] || 0) + e.amount;
    }
    return Object.values(g).sort((a, b) => b.key.localeCompare(a.key));
  }, [filtered]);

  // this month summary
  const monthEntries = entries.filter(e => monthKey(e.date) === curMonthKey);
  const monthTotals = monthEntries.reduce((acc, e) => {
    acc[e.currency] = (acc[e.currency] || 0) + e.amount;
    return acc;
  }, {});

  return (
    <div>
      <div className="anim-fadeUp">
        <h2 className="text-xl font-semibold tracking-tight">{t.history.title}</h2>
      </div>

      {/* This month summary */}
      <section className="card p-5 mt-3 anim-fadeUp" style={{animationDelay:'80ms'}}>
        <div className="flex items-baseline justify-between gap-3 flex-wrap">
          <div className="min-w-0">
            <div className="text-[11px] uppercase tracking-wider" style={{color:'var(--text-3)'}}>
              {t.history.thisMonth} · {t.months[now.getMonth()]}
            </div>
            <div className="mt-2 space-y-1">
              {Object.keys(monthTotals).length === 0 ? (
                <div className="text-2xl font-semibold tnum" style={{color:'var(--text-3)'}}>—</div>
              ) : (
                Object.entries(monthTotals).map(([cur, total]) => (
                  <div key={cur} className="text-2xl font-semibold tnum">
                    {CURRENCIES[cur].symbol} {fmt(total, cur)}
                  </div>
                ))
              )}
            </div>
          </div>
          <div className="pill">
            {monthEntries.length} {t.history.count}
          </div>
        </div>
      </section>

      {/* Filter */}
      <div className="mt-4 anim-fadeUp" style={{animationDelay:'150ms'}}>
        <div className="seg w-full" style={{display:'flex'}}>
          <button onClick={() => setFilter('all')} className={'flex-1 ' + (filter==='all'?'on':'')}>{t.history.filter.all}</button>
          <button onClick={() => setFilter('month')} className={'flex-1 ' + (filter==='month'?'on':'')}>{t.history.filter.month}</button>
          <button onClick={() => setFilter('year')} className={'flex-1 ' + (filter==='year'?'on':'')}>{t.history.filter.year}</button>
        </div>
      </div>

      {/* List */}
      <div className="mt-4 space-y-4">
        {groups.length === 0 ? (
          <EmptyState
            title={t.history.empty}
            hint={t.history.emptyHint}
          />
        ) : groups.map((g, gi) => {
          const [y, m] = g.key.split('-').map(Number);
          return (
            <section key={g.key} className="anim-fadeUp" style={{animationDelay: (200 + gi*60)+'ms'}}>
              <div className="flex items-baseline justify-between mb-2 px-1">
                <div className="text-[12px] font-medium" style={{color:'var(--text-1)'}}>
                  {t.months[m-1]} {y}
                </div>
                <div className="text-[11px] tnum" style={{color:'var(--text-2)'}}>
                  {Object.entries(g.total).map(([cur, total]) => (
                    <span key={cur} className="ml-3">
                      {CURRENCIES[cur].symbol} {fmt(total, cur)}
                    </span>
                  ))}
                </div>
              </div>

              <div className="card overflow-hidden">
                {g.items.map((e, i) => (
                  <div key={e.id} className={'list-enter flex items-center justify-between gap-3 px-4 py-3 ' + (i>0?'border-t':'') } style={{borderColor:'var(--line)'}}>
                    <div className="flex items-center gap-3 min-w-0 flex-1">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style={{
                        background: 'var(--bg-2)', border: '1px solid var(--line)',
                      }}>
                        <I.arrowDown width="16" height="16" style={{color:'var(--save)'}}/>
                      </div>
                      <div className="min-w-0">
                        <div className="text-[14px] font-medium tnum">
                          {CURRENCIES[e.currency].symbol} {fmt(e.amount, e.currency)}
                        </div>
                        <div className="text-[11.5px] truncate" style={{color:'var(--text-2)'}}>
                          {fmtDate(e.date, lang)}
                          {e.note ? ' · ' + e.note : ''}
                        </div>
                      </div>
                    </div>

                    {confirmId === e.id ? (
                      <div className="flex items-center gap-1.5">
                        <button className="btn-ghost px-2.5 py-1.5 rounded-lg text-[12px]" onClick={() => setConfirmId(null)}>
                          {t.history.cancel}
                        </button>
                        <button
                          className="px-2.5 py-1.5 rounded-lg text-[12px] font-medium"
                          style={{background:'oklch(0.6 0.18 25)', color:'#fff'}}
                          onClick={() => { onDelete(e.id); setConfirmId(null); }}
                        >
                          {t.history.delete}
                        </button>
                      </div>
                    ) : (
                      <button
                        onClick={() => setConfirmId(e.id)}
                        className="p-2 rounded-lg transition-colors"
                        style={{color:'var(--text-2)'}}
                        title={t.history.delete}
                      >
                        <I.trash width="16" height="16"/>
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </section>
          );
        })}
      </div>
    </div>
  );
}

function EmptyState({ title, hint }) {
  return (
    <div className="card p-10 text-center anim-fadeUp">
      <div className="mx-auto w-14 h-14 rounded-2xl flex items-center justify-center mb-4" style={{
        background:'var(--bg-2)', border:'1px solid var(--line)',
      }}>
        <I.history width="22" height="22" style={{color:'var(--text-2)'}}/>
      </div>
      <div className="text-[16px] font-medium">{title}</div>
      <div className="text-[13px] mt-1" style={{color:'var(--text-2)'}}>{hint}</div>
    </div>
  );
}

/* ============================================================
   DASHBOARD SCREEN
   ============================================================ */
function DashboardScreen({ t, lang, entries, bucketTotals, totalSaved, monthlyTotals, defaultCurrency, portfolio, setPortfolio }) {
  const now = new Date();
  const curMonthKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  // Last 6 months series
  const series = useMemo(() => {
    const arr = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      arr.push({
        key, month: d.getMonth(), year: d.getFullYear(),
        label: t.dash.months[d.getMonth()],
        value: monthlyTotals[key] || 0,
      });
    }
    return arr;
  }, [monthlyTotals, t]);

  const lastMonthKey = (() => {
    const d = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  })();

  const thisMonth = monthlyTotals[curMonthKey] || 0;
  const lastMonth = monthlyTotals[lastMonthKey] || 0;
  const avg6 = series.reduce((a, b) => a + b.value, 0) / 6;
  const totalIncome = entries.filter(e => e.currency === defaultCurrency).reduce((a,b)=>a+b.amount, 0);

  const networth = totalSaved + (portfolio.currency === defaultCurrency ? portfolio.amount : 0);

  const mom = lastMonth > 0 ? ((thisMonth - lastMonth) / lastMonth) * 100 : null;

  return (
    <div>
      <div className="anim-fadeUp">
        <h2 className="text-xl font-semibold tracking-tight">{t.dash.title}</h2>
      </div>

      {/* Stat cards 2x2 */}
      <div className="grid grid-cols-2 gap-2.5 mt-3">
        <StatCard t={t} title={t.dash.thisMonth} value={thisMonth} cur={defaultCurrency} delta={mom} delay={80}/>
        <StatCard t={t} title={t.dash.lastMonth} value={lastMonth} cur={defaultCurrency} delay={130}/>
        <StatCard t={t} title={t.dash.avg6} value={avg6} cur={defaultCurrency} delay={180}/>
        <StatCard t={t} title={t.dash.totalIncome} value={totalIncome} cur={defaultCurrency} delay={230}/>
      </div>

      {/* Net Worth */}
      <section className="card p-5 mt-4 anim-fadeUp" style={{animationDelay:'280ms'}}>
        <div className="text-[11px] uppercase tracking-wider" style={{color:'var(--text-3)'}}>{t.dash.networth}</div>
        <div className="text-3xl font-semibold mt-2 tnum">
          {CURRENCIES[defaultCurrency].symbol} {fmt(networth, defaultCurrency)}
        </div>
        <div className="text-[11px] mt-1" style={{color:'var(--text-2)'}}>
          {t.dash.networthHint}
        </div>

        <div className="mt-4 card-inner p-3.5">
          <div className="flex items-center justify-between mb-1">
            <div className="text-[12px]" style={{color:'var(--text-2)'}}>{t.dash.portfolioLabel}</div>
            <I.edit width="13" height="13" style={{color:'var(--text-3)'}}/>
          </div>
          <div className="flex items-baseline gap-2">
            <span className="tnum" style={{color:'var(--text-3)'}}>{CURRENCIES[defaultCurrency].symbol}</span>
            <input
              type="text"
              inputMode="decimal"
              className="bg-transparent border-0 outline-none text-xl font-semibold tnum w-full"
              placeholder="0"
              value={portfolio.amount || ''}
              onChange={(e) => {
                const v = e.target.value.replace(/[^\d.]/g,'');
                setPortfolio({ amount: parseFloat(v) || 0, currency: defaultCurrency });
              }}
            />
          </div>
          <div className="text-[10.5px] mt-1" style={{color:'var(--text-3)'}}>{t.dash.portfolioHint}</div>
        </div>
      </section>

      {/* Monthly chart */}
      <section className="card p-5 mt-4 anim-fadeUp" style={{animationDelay:'320ms'}}>
        <div className="text-[11px] uppercase tracking-wider" style={{color:'var(--text-3)'}}>{t.dash.monthly}</div>
        <div className="text-[12px] mt-1" style={{color:'var(--text-2)'}}>
          {CURRENCIES[defaultCurrency].symbol} {fmt(avg6, defaultCurrency)} · {t.dash.avg6}
        </div>

function MonthlyChart({ series, cur, t }) {
  const max = Math.max(...series.map(s => s.value), 1);
  const hasData = series.some(s => s.value > 0);
  const [activeIdx, setActiveIdx] = useState(null);
  const active = activeIdx != null ? series[activeIdx] : null;

  return (
    <div className="mt-3">
      {!hasData ? (
        <div className="h-40 flex items-center justify-center text-[13px]" style={{color:'var(--text-3)'}}>
          {t.dash.noData}
        </div>
      ) : (
        <>
          <div className="h-5 text-[11px] tnum" style={{color: active ? 'var(--text-1)' : 'var(--text-3)'}}>
            {active ? `${CURRENCIES[cur].symbol} ${fmt(active.value, cur)} · ${active.label}` : ' '}
          </div>
          <div className="flex items-end gap-1.5 h-40 mt-1">
            {series.map((s, i) => {
              const h = max > 0 ? (s.value / max) * 100 : 0;
              return (
                <button
                  key={s.key}
                  onClick={() => setActiveIdx(activeIdx === i ? null : i)}
                  className="flex-1 flex flex-col items-center justify-end gap-1.5 h-full -mx-0.5 px-0.5"
                >
                  <div className="w-full relative flex-1">
                    <div className="absolute bottom-0 left-0 right-0 rounded-md transition-all duration-300" style={{
                      height: Math.max(h, s.value > 0 ? 4 : 0) + '%',
                      background: activeIdx === i
                        ? 'linear-gradient(180deg, oklch(0.85 0.13 158), oklch(0.62 0.14 158))'
                        : 'linear-gradient(180deg, oklch(0.78 0.14 158), oklch(0.5 0.13 158))',
                      transformOrigin: 'bottom',
                      animation: 'growY 0.6s cubic-bezier(0.2,0.7,0.2,1) both',
                      animationDelay: (i*60 + 150)+'ms',
                      opacity: activeIdx == null || activeIdx === i ? 1 : 0.5,
                    }}/>
                  </div>
                  <div className="text-[10px]" style={{color: activeIdx === i ? 'var(--text-0)' : 'var(--text-2)'}}>{s.label}</div>
                </button>
              );
            })}
          </div>
        </>
      )}
      <style>{`@keyframes growY { from { transform: scaleY(0); } to { transform: scaleY(1); } }`}</style>
    </div>
  );
}

function GoalsScreen({ t, lang, goals, setGoals, bucketTotals, defaultCurrency, onOpenSheet }) {
  const removeGoal = (id) => {
    setGoals(prev => prev.filter(g => g.id !== id));
  };

  const currentOf = (g) => {
    if (g.mode === 'auto') return bucketTotals[g.bucket] || 0;
    return g.current || 0;
  };

  return (
    <div>
      <div className="flex items-baseline justify-between anim-fadeUp">
        <h2 className="text-xl font-semibold tracking-tight">{t.goals.title}</h2>
        <button onClick={onOpenSheet} className="btn-ghost px-3 py-1.5 rounded-lg text-[13px] flex items-center gap-1">
          <I.plus width="14" height="14"/> {t.goals.add}
        </button>
      </div>

      <div className="mt-4 space-y-3">
        {goals.length === 0 ? (
          <EmptyState title={t.goals.empty} hint=""/>
        ) : goals.map((g, i) => {
          const cur = currentOf(g);
          const pct = Math.min(100, g.target > 0 ? (cur / g.target) * 100 : 0);
          const remain = Math.max(0, g.target - cur);
          const done = pct >= 100;
          const bucketColor = g.mode === 'auto' ? BUCKETS.find(b => b.key === g.bucket)?.color : 'oklch(0.78 0.14 158)';
          return (
            <section key={g.id} className="card p-5 anim-fadeUp" style={{animationDelay: (i*60)+'ms'}}>
              <div className="flex items-start justify-between gap-3 mb-3">
                <div className="min-w-0">
                  <div className="text-[15px] font-semibold truncate">{g.name}</div>
                  <div className="text-[11.5px] mt-0.5" style={{color:'var(--text-2)'}}>
                    {g.mode === 'auto' && (
                      <span className="inline-flex items-center gap-1.5">
                        <span className="rounded-full" style={{width:6,height:6,background:bucketColor}}/>
                        {t.buckets[g.bucket]}
                      </span>
                    )}
                    {g.mode === 'manual' && <span>{t.goals.manualMode}</span>}
                  </div>
                </div>
                <button
                  onClick={() => removeGoal(g.id)}
                  className="p-2 rounded-lg btn-ghost shrink-0"
                  title={t.goals.remove}
                >
                  <I.trash width="14" height="14"/>
                </button>
              </div>

              <div className="flex items-baseline justify-between gap-2 mb-2 flex-wrap">
                <div className="tnum text-[18px] font-semibold">
                  {CURRENCIES[g.currency].symbol} {fmt(cur, g.currency)}
                </div>
                <div className="tnum text-[12px]" style={{color:'var(--text-2)'}}>
                  / {CURRENCIES[g.currency].symbol} {fmt(g.target, g.currency)}
                </div>
              </div>

              <div className="prog-track">
                <div className="prog-fill" style={{
                  width: pct + '%',
                  background: `linear-gradient(90deg, ${bucketColor}, ${bucketColor})`,
                  opacity: 0.9,
                }}/>
              </div>

              <div className="flex items-baseline justify-between mt-2 text-[11.5px]">
                <div className="tnum font-semibold" style={{color: done ? 'var(--save)' : 'var(--text-1)'}}>
                  {pct.toFixed(1)}%
                </div>
                <div className="tnum" style={{color:'var(--text-2)'}}>
                  {done ? t.goals.done : t.goals.remaining + ' ' + CURRENCIES[g.currency].symbol + ' ' + fmt(remain, g.currency)}
                </div>
              </div>
            </section>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   EXPENSES SCREEN
   ============================================================ */
function ExpensesScreen({ t, lang, expenses, onDelete, bucketTotals, defaultCurrency, onOpenSheet }) {
  const [confirmId, setConfirmId] = useState(null);
  const now = new Date();
  const curMonthKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  // Expenses in default currency for this month
  const monthExpenses = useMemo(
    () => expenses.filter(e => e.currency === defaultCurrency && monthKey(e.date) === curMonthKey),
    [expenses, defaultCurrency, curMonthKey]
  );
  const spentMonth = monthExpenses.reduce((a, b) => a + b.amount, 0);

  // Available 'ใช้จ่ายส่วนตัว' bucket (lifetime allocated) minus total expenses
  const totalSpent = expenses.filter(e => e.currency === defaultCurrency).reduce((a, b) => a + b.amount, 0);
  const selfBucket = bucketTotals.self || 0;
  const remaining = selfBucket - totalSpent;
  const pctUsed = selfBucket > 0 ? Math.min(100, (totalSpent / selfBucket) * 100) : 0;
  const isOver = totalSpent > selfBucket && selfBucket > 0;

  // By category for this month
  const byCategory = useMemo(() => {
    const m = {};
    for (const x of monthExpenses) {
      m[x.category] = (m[x.category] || 0) + x.amount;
    }
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [monthExpenses]);

  // Group expenses by date (descending), all currencies, all months
  const groups = useMemo(() => {
    const g = {};
    for (const x of expenses) {
      const k = x.date;
      if (!g[k]) g[k] = { key: k, items: [] };
      g[k].items.push(x);
    }
    return Object.values(g).sort((a, b) => b.key.localeCompare(a.key));
  }, [expenses]);

  return (
    <div>
      <div className="flex items-baseline justify-between anim-fadeUp">
        <h2 className="text-xl font-semibold tracking-tight">{t.expense.title}</h2>
        <button onClick={onOpenSheet} className="btn-ghost px-3 py-1.5 rounded-lg text-[13px] flex items-center gap-1">
          <I.plus width="14" height="14"/> {t.expense.add}
        </button>
      </div>

      {/* Budget summary card */}
      <section className="card p-5 mt-3 anim-fadeUp" style={{animationDelay:'80ms'}}>
        <div className="flex items-baseline justify-between gap-3 flex-wrap">
          <div className="min-w-0">
            <div className="text-[11px] uppercase tracking-wider" style={{color:'var(--text-3)'}}>
              {t.expense.thisMonth}
            </div>
            <div className="text-2xl font-semibold mt-1.5 tnum" style={{color: isOver ? '#e07a89' : 'var(--text-0)'}}>
              {CURRENCIES[defaultCurrency].symbol} {fmt(spentMonth, defaultCurrency)}
            </div>
          </div>
          <div className="pill">
            {monthExpenses.length} {t.history.count}
          </div>
        </div>

        {/* Self bucket budget vs spent (all-time) */}
        {selfBucket > 0 && (
          <div className="mt-4 card-inner p-3.5">
            <div className="flex items-baseline justify-between mb-1.5 gap-2">
              <div className="text-[12px] flex items-center gap-2 min-w-0">
                <span className="rounded-full shrink-0" style={{width:6,height:6,background:'var(--self)'}}/>
                <span style={{color:'var(--text-1)'}}>{t.buckets.self}</span>
              </div>
              <div className="text-[11px] tnum" style={{color:'var(--text-3)'}}>
                {pctUsed.toFixed(0)}% {t.expense.ofBudget}
              </div>
            </div>
            <div className="prog-track" style={{background:'var(--bg-1)', height: 8}}>
              <div className="h-full rounded-full transition-all duration-700" style={{
                width: pctUsed + '%',
                background: isOver
                  ? 'linear-gradient(90deg, #e07a89, #c45064)'
                  : 'linear-gradient(90deg, oklch(0.82 0.13 78), oklch(0.7 0.14 60))',
              }}/>
            </div>
            <div className="flex items-baseline justify-between mt-2.5 text-[11.5px]">
              <div className="tnum" style={{color:'var(--text-2)'}}>
                {t.expense.spent}: <span className="font-semibold" style={{color:'var(--text-0)'}}>{CURRENCIES[defaultCurrency].symbol} {fmt(totalSpent, defaultCurrency)}</span>
              </div>
              <div className="tnum" style={{color: isOver ? '#e07a89' : 'var(--save)'}}>
                {isOver ? t.expense.overBudget : t.expense.remaining} {CURRENCIES[defaultCurrency].symbol} {fmt(Math.abs(remaining), defaultCurrency)}
              </div>
            </div>
          </div>
        )}
      </section>

      {/* Category breakdown for this month */}
      {byCategory.length > 0 && (
        <section className="card p-5 mt-4 anim-fadeUp" style={{animationDelay:'150ms'}}>
          <div className="text-[11px] uppercase tracking-wider" style={{color:'var(--text-3)'}}>{t.expense.byCategory}</div>
          <div className="mt-3 space-y-2.5">
            {byCategory.map(([catKey, val], i) => {
              const cat = EXPENSE_CATEGORIES.find(c => c.key === catKey) || EXPENSE_CATEGORIES[EXPENSE_CATEGORIES.length-1];
              const Icon = I[cat.icon] || I.other;
              const pct = spentMonth > 0 ? (val / spentMonth) * 100 : 0;
              return (
                <div key={catKey} className="anim-fadeUp" style={{animationDelay: (200 + i*50) + 'ms'}}>
                  <div className="flex items-center justify-between gap-3 mb-1">
                    <div className="flex items-center gap-2.5 min-w-0">
                      <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{
                        background: `color-mix(in oklch, ${cat.color} 18%, transparent)`,
                        color: cat.color,
                      }}>
                        <Icon width="14" height="14"/>
                      </div>
                      <span className="text-[13px] font-medium truncate">{t.expense.categories[catKey] || catKey}</span>
                      <span className="text-[10.5px] tnum shrink-0" style={{color:'var(--text-3)'}}>{pct.toFixed(0)}%</span>
                    </div>
                    <div className="tnum text-[13px] font-semibold shrink-0">
                      {CURRENCIES[defaultCurrency].symbol} {fmt(val, defaultCurrency)}
                    </div>
                  </div>
                  <div className="h-1.5 rounded-full overflow-hidden" style={{background:'var(--bg-2)'}}>
                    <div className="h-full bar-grow" style={{
                      width: pct + '%',
                      background: cat.color,
                      opacity: 0.85,
                      animationDelay: (200 + i*50) + 'ms',
                    }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* List */}
      <div className="mt-4 space-y-4">
        {groups.length === 0 ? (
          <EmptyState title={t.expense.empty} hint={t.expense.emptyHint}/>
        ) : groups.map((g, gi) => (
          <section key={g.key} className="anim-fadeUp" style={{animationDelay: (200 + gi*50)+'ms'}}>
            <div className="text-[11.5px] mb-2 px-1" style={{color:'var(--text-2)'}}>
              {fmtDate(g.key, lang)}
            </div>
            <div className="card overflow-hidden">
              {g.items.map((e, i) => {
                const cat = EXPENSE_CATEGORIES.find(c => c.key === e.category) || EXPENSE_CATEGORIES[EXPENSE_CATEGORIES.length-1];
                const Icon = I[cat.icon] || I.other;
                return (
                  <div key={e.id} className={'list-enter flex items-center justify-between gap-3 px-4 py-3 ' + (i>0?'border-t':'') } style={{borderColor:'var(--line)'}}>
                    <div className="flex items-center gap-3 min-w-0 flex-1">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style={{
                        background: `color-mix(in oklch, ${cat.color} 16%, var(--bg-2))`,
                        color: cat.color,
                        border: '1px solid var(--line)',
                      }}>
                        <Icon width="16" height="16"/>
                      </div>
                      <div className="min-w-0">
                        <div className="text-[14px] font-medium tnum" style={{color:'#e7a98a'}}>
                          − {CURRENCIES[e.currency].symbol} {fmt(e.amount, e.currency)}
                        </div>
                        <div className="text-[11.5px] truncate" style={{color:'var(--text-2)'}}>
                          {t.expense.categories[e.category] || e.category}
                          {e.note ? ' · ' + e.note : ''}
                        </div>
                      </div>
                    </div>
                    {confirmId === e.id ? (
                      <div className="flex items-center gap-1.5">
                        <button className="btn-ghost px-2.5 py-1.5 rounded-lg text-[12px]" onClick={() => setConfirmId(null)}>
                          {t.history.cancel}
                        </button>
                        <button
                          className="px-2.5 py-1.5 rounded-lg text-[12px] font-medium"
                          style={{background:'oklch(0.6 0.18 25)', color:'#fff'}}
                          onClick={() => { onDelete(e.id); setConfirmId(null); }}
                        >
                          {t.expense.delete}
                        </button>
                      </div>
                    ) : (
                      <button
                        onClick={() => setConfirmId(e.id)}
                        className="p-2 rounded-lg transition-colors"
                        style={{color:'var(--text-2)'}}
                      >
                        <I.trash width="16" height="16"/>
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </section>
        ))}
      </div>
    </div>
  );
}

          <span className="text-2xl" style={{color:'var(--text-3)'}}>{CURRENCIES[currency].symbol}</span>
          <input
            type="text"
            inputMode="decimal"
            className="big-amount tnum"
            placeholder="0"
            value={amount}
            onChange={(e) => setAmount(fmtNumInput(e.target.value))}
            autoFocus
            style={{fontSize:'clamp(36px, 11vw, 52px)'}}
          />
        </div>

        {/* Currency */}
        <div className="flex justify-center mt-2">
          <div className="seg">
            {Object.keys(CURRENCIES).map(c => (
              <button key={c} onClick={() => setCurrency(c)} className={currency===c?'on':''}>
                {t.common.currency[c]}
              </button>
            ))}
          </div>
        </div>

        {/* Category grid */}
        <div className="mt-5">
          <label className="block text-[11px] mb-2" style={{color:'var(--text-2)'}}>{t.expense.category}</label>
          <div className="grid grid-cols-5 gap-2">
            {EXPENSE_CATEGORIES.map(c => {
              const Icon = I[c.icon] || I.other;
              const isActive = category === c.key;
              return (
                <button
                  key={c.key}
                  onClick={() => setCategory(c.key)}
                  className="flex flex-col items-center gap-1 py-2 rounded-xl transition-all"
                  style={{
                    background: isActive ? `color-mix(in oklch, ${c.color} 16%, var(--bg-2))` : 'var(--bg-2)',
                    border: '1px solid ' + (isActive ? c.color : 'var(--line)'),
                  }}
                >
                  <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{color: c.color}}>
                    <Icon width="16" height="16"/>
                  </div>
                  <span className="text-[9.5px] leading-tight text-center" style={{color: isActive ? 'var(--text-0)' : 'var(--text-2)'}}>
                    {t.expense.categories[c.key]}
                  </span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Date + Note */}
        <div className="grid grid-cols-1 gap-3 mt-4">
          <div>
            <label className="block text-[11px] mb-1.5" style={{color:'var(--text-2)'}}>{t.expense.date}</label>
            <input
              type="date"
              className="field px-3.5 py-3 w-full text-[14px]"
              value={date}
              onChange={(e) => setDate(e.target.value)}
              max={new Date().toISOString().slice(0,10)}
              style={{colorScheme:'dark'}}
            />
          </div>
          <div>
            <label className="block text-[11px] mb-1.5" style={{color:'var(--text-2)'}}>{t.expense.note}</label>
            <input
              type="text"
              className="field px-3.5 py-3 w-full text-[14px]"
              placeholder={t.expense.notePlaceholder}
              value={note}
              onChange={(e) => setNote(e.target.value)}
              maxLength={80}
            />
          </div>
        </div>

        {/* Actions */}
        <div className="flex gap-2 mt-5">
          <button className="btn-ghost flex-1 py-3 rounded-xl text-[14px]" onClick={onClose}>{t.expense.cancel}</button>
          <button
            className="btn-primary flex-1 py-3 rounded-xl text-[14px] disabled:opacity-40"
            onClick={submit}
            disabled={numAmount <= 0}
          >
            {t.expense.save}
          </button>
        </div>
      </div>
    </>
  );
}

/* ============================================================
   Mount
   ============================================================ */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
